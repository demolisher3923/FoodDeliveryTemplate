<section class="admin-dashboard">
  <div class="dashboard-layout">
    <aside class="dashboard-sidenav">
      <h3>Admin Panel</h3>
      <button type="button" [class.active]="activeSection === 'dashboard'" (click)="setActiveSection('dashboard')">Dashboard</button>
      <button type="button" [class.active]="activeSection === 'users'" (click)="setActiveSection('users')">Users Table</button>
      <button type="button" [class.active]="activeSection === 'orders'" (click)="setActiveSection('orders')">Orders Table</button>
    </aside>

    <div class="dashboard-content">
      @if (activeSection === 'dashboard') {
        <app-admin-dashboard-panel
          [todaysOrdersCount]="todaysOrdersCount"
          [todaysRevenue]="todaysRevenue"
          [activeUsersCount]="activeUsersCount"
          [orders]="orders">
        </app-admin-dashboard-panel>
      }

      @if (activeSection === 'users') {
        <app-admin-users-table
          [searchForm]="searchForm"
          [loadingUsers]="loadingUsers"
          [users]="users"
          [pageNumber]="pageNumber"
          [pageSize]="pageSize"
          [pageSizeOptions]="pageSizeOptions"
          [totalPages]="totalPages"
          [totalCount]="totalCount"
          [pageNumbers]="pageNumbers"
          (searchApplied)="applySearch()"
          (searchCleared)="clearSearch()"
          (sortChanged)="changeSort($event)"
          (pageChanged)="goToPage($event)"
          (pageSizeChanged)="onUsersPageSizeChange($event)">
        </app-admin-users-table>
      }

      @if (activeSection === 'orders') {
        <app-admin-orders-table
          [loadingOrders]="loadingOrders"
          [pagedOrders]="pagedOrders"
          [ordersCount]="orders.length"
          [ordersPageNumber]="ordersPageNumber"
          [ordersPageSize]="ordersPageSize"
          [ordersTotalPages]="ordersTotalPages"
          [pageSizeOptions]="pageSizeOptions"
          [orderPageNumbers]="orderPageNumbers"
          [orderStatusOptions]="orderStatusOptions"
          [orderStatusDrafts]="orderStatusDrafts"
          [updatingOrderId]="updatingOrderId"
          (refreshOrders)="loadOrders()"
          (orderPageSizeChanged)="onOrdersPageSizeChange($event)"
          (ordersPageChanged)="goToOrdersPage($event)"
          (statusDraftChanged)="onStatusDraftChange($event.orderId, $event.status)"
          (statusSaved)="updateOrderStatus($event)">
        </app-admin-orders-table>
      }
    </div>
  </div>
</section>
