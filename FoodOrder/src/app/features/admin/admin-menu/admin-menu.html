<section class="admin-dashboard">
  <div class="dashboard-layout">
    <aside class="dashboard-sidenav">
      <h3>Admin Panel</h3>
      <button type="button" [class.active]="activeSection === 'dashboard'" (click)="setActiveSection('dashboard')">Dashboard</button>
      <button type="button" [class.active]="activeSection === 'menu'" (click)="setActiveSection('menu')">Menu</button>
      <button type="button" [class.active]="activeSection === 'users'" (click)="setActiveSection('users')">Users Table</button>
      <button type="button" [class.active]="activeSection === 'orders'" (click)="setActiveSection('orders')">Orders Table</button>
    </aside>

    <div class="dashboard-content">
      @if (activeSection === 'dashboard') {
        <app-admin-dashboard-panel></app-admin-dashboard-panel>
      }

      @if (activeSection === 'menu') {
        <app-admin-menu-management></app-admin-menu-management>
      }

      @if (activeSection === 'users') {
        <app-admin-users-table></app-admin-users-table>
      }

      @if (activeSection === 'orders') {
        <app-admin-orders-table></app-admin-orders-table>
      }
    </div>
  </div>
</section>
